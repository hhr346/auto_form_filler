<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #0078D4;
      color: white;
    }
    
    .btn-primary:hover {
      background: #005a9e;
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      margin: 16px 0 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .field-list {
      max-height: 300px;
      overflow-y: auto;
    }
    
    .field-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #f9f9f9;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .field-item input[type="text"],
    .field-item input[type="tel"],
    .field-item input[type="email"],
    .field-item input[type="date"],
    .field-item select {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }
    
    .field-item input:focus,
    .field-item select:focus {
      outline: none;
      border-color: #0078D4;
    }
    
    .field-actions {
      display: flex;
      gap: 4px;
    }
    
    .field-actions button {
      padding: 4px 8px;
      font-size: 12px;
      flex: none;
    }
    
    .btn-delete {
      background: #fee;
      color: #c00;
    }
    
    .btn-delete:hover {
      background: #fcc;
    }
    
    .btn-add {
      width: 100%;
      margin-top: 8px;
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-add:hover {
      background: #e0e0e0;
    }
    
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
      display: none;
    }
    
    .status.success {
      background: #efe;
      color: #060;
      display: block;
    }
    
    .status.error {
      background: #fee;
      color: #c00;
      display: block;
    }
    
    .help-text {
      font-size: 12px;
      color: #999;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Auto Form Filler
  </h1>
  
  <div id="status" class="status"></div>
  
  <div class="button-group">
    <button id="autoFillBtn" class="btn-primary">⚡ 一键填充</button>
    <button id="saveBtn" class="btn-secondary">💾 保存数据</button>
  </div>
  
  <div class="section-title">基本信息</div>
  <div id="fieldList" class="field-list">
    <!-- 动态生成字段 -->
  </div>
  
  <button id="addFieldBtn" class="btn-add">+ 添加自定义字段</button>
  
  <div class="help-text">
    💡 提示：在求职网站填写表单时，点击"一键填充"即可自动填写基本信息。
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
